name: ilvecchioforno

services:
  ilvecchioforno_api:
    container_name: ilvecchioforno_api
    image: ilvecchioforno.api
    build:
      context: .
      dockerfile: src/IlVecchioForno.API/Dockerfile
    restart: always
    env_file: ".env"
    environment:
      ConnectionStrings__IlVecchioFornoContext: "Host=ilvecchioforno_db;Port=5432;Username=${DB_USER};Password=${DB_PASSWORD};Database=${DB_NAME}"
    depends_on:
      - ilvecchioforno_db
  ilvecchioforno_db:
    container_name: ilvecchioforno_db
    image: postgres:18.1
    restart: always
    env_file: ".env"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ilvecchioforno_db_vol:/var/lib/postgresql:Z
    ports:
      - target: 5432
        published: 5432
        protocol: tcp
        mode: host

volumes:
  ilvecchioforno_db_vol:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/Databases/PostgreSQL
